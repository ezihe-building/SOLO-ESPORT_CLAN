services:
  - type: web
    name: solos-esportz
    runtime: node
    region: oregon
    plan: free
    buildCommand: |
      corepack enable && corepack prepare pnpm@latest --activate
      pnpm install --frozen-lockfile
      pnpm run typecheck:libs
      BASE_PATH=/ PORT=3000 pnpm --filter @workspace/solos-esportz run build
      pnpm --filter @workspace/api-server run build
    startCommand: node artifacts/api-server/dist/index.mjs
    healthCheckPath: /api/healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: SESSION_SECRET
        generateValue: true
      - key: SERVE_STATIC
        value: "true"
      - key: PORT
        value: "10000"
